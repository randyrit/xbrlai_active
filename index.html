    function DeadlineCard(){const d=55;return<div className="bg-white rounded-xl border border-gray-200 p-4 lg:p-5 card-hover h-full"><div className="flex flex-col sm:flex-row sm:items-start sm:justify-between mb-4 gap-2"><div><h2 className="text-sm font-semibold text-gray-900">Filing Timeline</h2><p className="text-xs text-gray-500 mt-0.5">10-Q for period ending March 31, 2026</p></div><div className="flex items-center gap-1.5 text-primary-700 shrink-0"><Icons.Calendar /><div><span className="text-xs font-semibold">May 10, 2026</span><p className="text-[10px] text-gray-400">SEC Deadline</p></div></div></div><div className="flex flex-col sm:flex-row items-start sm:items-center gap-3 mb-4"><div className="bg-primary-600 text-white rounded-xl px-4 py-2.5 text-center shrink-0"><div className="text-xl font-bold">{d}</div><div className="text-[10px] font-medium text-primary-200">days left</div></div><div className="flex-1 grid grid-cols-3 gap-2 w-full">{[{v:'15',l:'to Q1 close'},{v:'30',l:'to int. review'},{v:'40',l:'to validation'}].map((x,i)=><div key={i} className="bg-gray-50 rounded-lg px-2 py-1.5 text-center"><div className="text-base font-bold text-gray-800">{x.v}</div><div className="text-[9px] text-gray-400 font-medium">{x.l}</div></div>)}</div></div><div className="relative"><div className="h-1.5 bg-gray-100 rounded-full overflow-hidden"><div className="h-full bg-primary-500 rounded-full progress-bar" style={{width:'0%'}}></div></div><div className="flex justify-between mt-1.5 overflow-x-auto gap-1">{['Q1 Ends|Mar 31','Review|Apr 15','Validation|Apr 25','Filing|May 10'].map((m,i)=>{const[l,dd]=m.split('|');return<div key={i} className="text-center shrink-0"><div className="text-[8px] sm:text-[9px] font-semibold text-gray-600 whitespace-nowrap">{l}</div><div className="text-[8px] sm:text-[9px] text-gray-400">{dd}</div></div>})}</div></div></div>}
    function OverallProgress(){const p=computeProgress();return<div className="bg-white rounded-xl border border-gray-200 p-4 lg:p-5 card-hover h-full"><h2 className="text-sm font-semibold text-gray-900 mb-3">Disclosure Completion</h2><div className="flex items-center gap-4"><div className="relative w-24 h-24 shrink-0"><svg className="w-24 h-24 -rotate-90" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="#f1f5f9" strokeWidth="8"/><circle cx="50" cy="50" r="42" fill="none" stroke="#3B82F6" strokeWidth="8" strokeLinecap="round" strokeDasharray={`${p.pct*2.64} ${264-p.pct*2.64}`} className="transition-all duration-1000"/></svg><div className="absolute inset-0 flex flex-col items-center justify-center"><span className="text-xl font-bold text-gray-900">{p.pct}%</span><span className="text-[9px] text-gray-400 font-medium">complete</span></div></div><div className="flex-1 space-y-2">{[['Complete','bg-emerald-500',p.complete],['In Review','bg-amber-500',p.inReview],['In Progress','bg-primary-500',p.inProgress],['Not Started','bg-gray-300',p.notStarted]].map(([l,c,v],i)=><div key={i} className="flex items-center justify-between"><div className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full ${c}`}></div><span className="text-[11px] text-gray-600">{l}</span></div><span className="text-[11px] font-semibold text-gray-800">{v}/{p.total}</span></div>)}</div></div></div>}
    function PriorQuarterCard(){const m=[{label:'Net Revenue',value:PRIOR_QUARTER.revenue,sub:'+13% YoY'},{label:'Net Income',value:PRIOR_QUARTER.netIncome,sub:'EPS: '+PRIOR_QUARTER.eps},{label:'Operating Income',value:PRIOR_QUARTER.operatingIncome,sub:'ex. $4.3B charges'},{label:'AWS Revenue',value:PRIOR_QUARTER.awsRevenue,sub:'+20% YoY'}];return<div className="bg-white rounded-xl border border-gray-200 p-4 lg:p-5 card-hover h-full"><div className="flex items-center justify-between mb-3"><h2 className="text-sm font-semibold text-gray-900">Prior Quarter</h2><span className="text-[10px] font-medium text-gray-400 bg-gray-50 px-2 py-0.5 rounded-full">{PRIOR_QUARTER.period}</span></div><div className="grid grid-cols-2 gap-2">{m.map((x,i)=><div key={i} className="bg-gray-50 rounded-lg p-2.5"><div className="text-[10px] text-gray-400 font-medium">{x.label}</div><div className="text-base font-bold text-gray-900">{x.value}</div><div className="text-[10px] text-gray-500">{x.sub}</div></div>)}</div><p className="text-[9px] text-gray-400 mt-2">Source: SEC EDGAR (CIK: {COMPANY.cik})</p></div>}
    function QuickActions(){return<div className="bg-white rounded-xl border border-gray-200 p-4 lg:p-5 card-hover h-full"><h2 className="text-sm font-semibold text-gray-900 mb-3">Next Steps</h2><div className="space-y-2">{[{l:'Continue Tagging',d:'Comprehensive Income',p:true},{l:'Review Submission',d:'Balance Sheets',p:false},{l:'Start Cash Flows',d:'Not yet started',p:false}].map((a,i)=><button key={i} className={`w-full text-left px-3 py-2.5 rounded-lg flex items-center justify-between transition-colors ${a.p?'bg-primary-600 hover:bg-primary-700 text-white':'bg-gray-50 hover:bg-gray-100 text-gray-800'}`}><div><div className={`text-xs font-medium ${a.p?'text-white':'text-gray-800'}`}>{a.l}</div><div className={`text-[10px] ${a.p?'text-primary-200':'text-gray-400'}`}>{a.d}</div></div><span className={a.p?'text-primary-200':'text-gray-400'}><Icons.ArrowRight /></span></button>)}</div></div>}
    function ValidationPanel(){
      const [valState, setValState] = useState('idle'); // idle | running | done
      const [progress, setProgress] = useState(0);
      const [runPhase, setRunPhase] = useState('');
      const [showAI, setShowAI] = useState(false);
      const e=validationIssues.filter(v=>v.severity==='error').length,w=validationIssues.filter(v=>v.severity==='warning').length;

      const aiRecommendations = [
        { priority: 'high', title: 'Fix balance sheet equation', desc: 'Assets are $2M higher than Liabilities + Equity. Review recent journal entries for Q1 2026 — likely a rounding issue in deferred tax assets (us-gaap:DeferredIncomeTaxAssetsNet).', action: 'Auto-fix', rule: 'BS-01' },
        { priority: 'high', title: 'Add missing Cash element', desc: 'CashAndCashEquivalentsAtCarryingValue is required by SEC rules. Value $73,387M is present in the document but untagged — click to auto-tag.', action: 'Tag now', rule: 'DQC-0004' },
        { priority: 'high', title: 'Correct sign on securities', desc: 'AvailableForSaleSecurities should be positive (debit balance). The negative value suggests the sign was inverted during import. Flip the sign to resolve.', action: 'Flip sign', rule: 'DQC-0015' },
        { priority: 'medium', title: 'Add OCI dimensional breakdown', desc: 'Other Comprehensive Income requires an axis breakdown by component (foreign currency, securities, hedges). Consider using OtherComprehensiveIncomeLossByComponentAxis.', action: 'Add axis', rule: 'DQC-0043' },
        { priority: 'low', title: 'Revenue disaggregation gap', desc: 'Segment revenues sum to $179.8B vs total $180.2B — $400M gap likely from intersegment eliminations. Add an EliminationsOfIntersegmentAmounts member.', action: 'Review', rule: 'DQC-0099' },
      ];

      const runValidation = () => {
        setValState('running');
        setProgress(0);
        setShowAI(false);
        const phases = [
          [10, 'Checking document structure...'],
          [25, 'Validating taxonomy elements...'],
          [40, 'Running DQC rules (0004–0099)...'],
          [55, 'Verifying calculation linkbase...'],
          [70, 'Cross-referencing periods...'],
          [85, 'Analyzing sign consistency...'],
          [95, 'Generating AI recommendations...'],
          [100, 'Complete'],
        ];
        let i = 0;
        const tick = () => {
          if (i < phases.length) {
            setProgress(phases[i][0]);
            setRunPhase(phases[i][1]);
            i++;
            setTimeout(tick, 500 + Math.random() * 400);
          } else {
            setTimeout(() => { setValState('done'); setShowAI(true); }, 300);
          }
        };
        tick();
      };

      return <div className="bg-white rounded-xl border border-gray-200 p-4 lg:p-5 card-hover h-full flex flex-col">
        <div className="flex items-center justify-between mb-3">
          <h2 className="text-sm font-semibold text-gray-900">XBRL Validation</h2>
          {valState === 'running' ? (
            <span className="text-[11px] text-primary-600 font-medium flex items-center gap-1.5">
              <svg className="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
              Running...
            </span>
          ) : (
            <button onClick={runValidation} className="bg-primary-600 hover:bg-primary-700 text-white text-[11px] font-medium px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1">
              {valState === 'done' && <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>}
              {valState === 'done' ? 'Re-run' : 'Run'}
            </button>
          )}
        </div>

        {/* Running state */}
        {valState === 'running' && (
          <div className="space-y-3 flex-1">
            <div className="bg-primary-50 rounded-xl p-4 space-y-3">
              <div className="flex items-center justify-between">
                <span className="text-xs font-semibold text-primary-800">Validation in progress</span>
                <span className="text-xs font-bold text-primary-700">{progress}%</span>
              </div>
              <div className="h-2 bg-primary-100 rounded-full overflow-hidden">
                <div className="h-full bg-primary-500 rounded-full transition-all duration-500 ease-out" style={{width:`${progress}%`}}></div>
              </div>
              <p className="text-[11px] text-primary-600 font-medium">{runPhase}</p>
            </div>
            <div className="space-y-2">
              {[
                [progress>=10,'Document structure'],
                [progress>=25,'Taxonomy elements'],
                [progress>=40,'DQC rule checks'],
                [progress>=55,'Calculation linkbase'],
                [progress>=70,'Period references'],
                [progress>=85,'Sign consistency'],
                [progress>=95,'AI analysis'],
              ].map(([done,label],i) => (
                <div key={i} className="flex items-center gap-2 text-[11px]">
                  {done ? (
                    <svg className="w-3.5 h-3.5 text-emerald-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>
                  ) : progress >= [10,25,40,55,70,85,95][i] - 15 ? (
                    <svg className="w-3.5 h-3.5 text-primary-500 animate-spin shrink-0" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                  ) : (
                    <div className="w-3.5 h-3.5 rounded-full border-2 border-gray-200 shrink-0"></div>
                  )}
                  <span className={done ? 'text-gray-700' : 'text-gray-400'}>{label}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Idle or Done — show stats */}
        {valState !== 'running' && (
          <>
            <div className="flex gap-2 mb-3">
              {[[e,'Errors','bg-red-50','text-red-600','text-red-500'],[w,'Warnings','bg-amber-50','text-amber-600','text-amber-500'],[580,'Valid','bg-emerald-50','text-emerald-600','text-emerald-500']].map(([v,l,bg,tc,ts],i)=><div key={i} className={`flex-1 ${bg} rounded-lg p-2 text-center`}><div className={`text-lg font-bold ${tc}`}>{v}</div><div className={`text-[10px] ${ts} font-medium`}>{l}</div></div>)}
            </div>

            {/* AI Recommendations (after run completes) */}
            {showAI && (
              <div className="mb-3 space-y-2">
                <div className="flex items-center gap-1.5 mb-1">
                  <svg className="w-3.5 h-3.5 text-violet-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                  <span className="text-[11px] font-semibold text-violet-700">AI Recommendations</span>
                  <span className="text-[9px] text-violet-400 ml-auto">{aiRecommendations.length} suggestions</span>
                </div>
                <div className="space-y-1.5 max-h-56 overflow-y-auto">
                  {aiRecommendations.map((rec, i) => (
                    <div key={i} className="bg-violet-50 rounded-lg p-2.5 group">
                      <div className="flex items-start justify-between gap-2">
                        <div className="min-w-0">
                          <div className="flex items-center gap-1.5">
                            <span className={`px-1.5 py-px rounded text-[8px] font-bold uppercase ${rec.priority==='high'?'bg-red-100 text-red-600':rec.priority==='medium'?'bg-amber-100 text-amber-600':'bg-gray-100 text-gray-500'}`}>{rec.priority}</span>
                            <span className="text-[9px] font-mono text-violet-400">{rec.rule}</span>
                          </div>
                          <p className="text-[11px] font-medium text-gray-800 mt-1">{rec.title}</p>
                          <p className="text-[10px] text-gray-500 mt-0.5 leading-relaxed">{rec.desc}</p>
                        </div>
                        <button className="shrink-0 px-2 py-1 bg-violet-600 hover:bg-violet-700 text-white text-[10px] font-medium rounded-md transition-colors opacity-80 group-hover:opacity-100 mt-1">
                          {rec.action}
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Issue list */}
            <div className="space-y-1.5 flex-1 overflow-y-auto max-h-48">
              {validationIssues.map((issue,i)=><div key={i} className={`flex items-start gap-2 p-2 rounded-lg ${issue.severity==='error'?'bg-red-50':'bg-amber-50'}`}><span className={`mt-0.5 shrink-0 ${issue.severity==='error'?'text-red-500':'text-amber-500'}`}><Icons.Warning /></span><div className="min-w-0"><div className="flex items-center gap-1.5"><span className={`text-[9px] font-mono font-bold ${issue.severity==='error'?'text-red-600':'text-amber-600'}`}>{issue.rule}</span><span className="text-[9px] text-gray-400">{issue.section}</span></div><p className="text-[11px] text-gray-700 mt-px leading-tight">{issue.message}</p></div></div>)}
            </div>
          </>
        )}
      </div>;
    }
    function DisclosureSectionsTable(){return<div className="bg-white rounded-xl border border-gray-200 overflow-hidden card-hover"><div className="px-4 py-3 border-b border-gray-100 flex items-center justify-between"><h2 className="text-sm font-semibold text-gray-900">Disclosure Sections</h2><button className="text-[11px] font-medium text-primary-600 hover:text-primary-700 flex items-center gap-0.5">View all <Icons.ArrowRight /></button></div><div className="divide-y divide-gray-50">{disclosureSections.map(section=><div key={section.category}><div className="px-4 py-2 bg-gray-50"><h3 className="text-[10px] font-semibold text-gray-500 uppercase tracking-wider">{section.category}</h3></div>{section.items.map((item,i)=><div key={i} className="px-4 py-2 flex items-center justify-between hover:bg-gray-50 transition-colors cursor-pointer group"><div className="flex items-center gap-2.5 min-w-0">{item.status==='complete'?<div className="w-4 h-4 rounded-full bg-emerald-500 flex items-center justify-center shrink-0"><span className="text-white"><svg className="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg></span></div>:<div className={`w-4 h-4 rounded-full border-2 shrink-0 ${item.status==='in-review'?'border-amber-400 bg-amber-50':item.status==='in-progress'?'border-primary-400 bg-primary-50':'border-gray-300'}`}></div>}<span className={`text-xs ${item.status==='complete'?'text-gray-500':'text-gray-800'} truncate`}>{item.name}</span></div><div className="flex items-center gap-2 shrink-0 ml-2">{item.errors>0&&<span className="hidden sm:flex items-center gap-0.5 text-red-500 text-[10px] font-medium"><Icons.Warning />{item.errors}</span>}<span className="hidden md:inline text-[10px] text-gray-400 font-medium">{item.tags} tags</span><span className={`px-2 py-px rounded-full text-[10px] font-medium ${getStatusColor(item.status)}`}>{getStatusLabel(item.status)}</span><span className="text-gray-300 group-hover:text-gray-500 transition-colors"><Icons.ArrowRight /></span></div></div>)}</div>)}</div></div>}
    function RecentActivity(){const a=[{action:'Completed',detail:'Entity Information tagging',user:'Jane Doe',time:'2h ago',color:'bg-emerald-500'},{action:'Submitted for review',detail:'Consolidated Balance Sheets',user:'Mike Chen',time:'5h ago',color:'bg-amber-500'},{action:'Started tagging',detail:'Revenue disaggregation',user:'Jane Doe',time:'Yesterday',color:'bg-primary-500'},{action:'Updated',detail:'US GAAP 2026 taxonomy loaded',user:'System',time:'Yesterday',color:'bg-gray-400'},{action:'Submitted for review',detail:'Statements of Operations',user:'Sarah Kim',time:'2 days ago',color:'bg-amber-500'}];return<div className="bg-white rounded-xl border border-gray-200 p-4 lg:p-5 card-hover h-full"><h2 className="text-sm font-semibold text-gray-900 mb-3">Recent Activity</h2><div className="space-y-2.5">{a.map((x,i)=><div key={i} className="flex items-start gap-2.5"><div className={`w-1.5 h-1.5 rounded-full mt-1.5 shrink-0 ${x.color}`}></div><div className="min-w-0"><p className="text-xs text-gray-700 leading-tight"><span className="font-medium">{x.action}</span> {x.detail}</p><p className="text-[10px] text-gray-400 mt-px">{x.user} &middot; {x.time}</p></div></div>)}</div></div>}

    function FilingsPage(){const[sf,setSf]=useState(0);const f=tenQFilings[sf];const ic=f.status==='in-progress';return<div className="space-y-4"><div className="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-2 sm:gap-3">{tenQFilings.map((x,i)=><button key={i} onClick={()=>setSf(i)} className={`text-left p-2.5 sm:p-3 rounded-xl border transition-all ${sf===i?'border-primary-400 bg-primary-50 ring-1 ring-primary-200':'border-gray-200 bg-white hover:border-gray-300 card-hover'}`}><div className="flex items-center justify-between mb-1"><span className="text-[11px] sm:text-xs font-semibold text-gray-800">{x.period}</span><span className={`px-1.5 py-px rounded-full text-[9px] font-medium ${x.status==='filed'?'bg-emerald-100 text-emerald-700':'bg-primary-100 text-primary-700'}`}>{x.status==='filed'?'Filed':'In Progress'}</span></div><div className="text-[10px] text-gray-400 truncate">Period: {x.periodEnd}</div><div className="text-[10px] text-gray-400 truncate">Deadline: {x.deadline}</div><div className="mt-2 h-1 bg-gray-100 rounded-full overflow-hidden"><div className={`h-full rounded-full ${x.status==='filed'?'bg-emerald-500':'bg-primary-500'}`} style={{width:`${x.pct}%`}}></div></div></button>)}</div>{ic&&<div className="bg-white rounded-xl border border-gray-200 p-4"><h2 className="text-sm font-semibold text-gray-900 mb-3">Filing Workflow</h2><div className="flex items-center gap-1 overflow-x-auto pb-1">{filingWorkflowStages.map((s,i)=><React.Fragment key={i}><div className={`shrink-0 px-3 py-1.5 rounded-lg text-[11px] font-medium ${s.status==='active'?'bg-primary-600 text-white':'bg-gray-100 text-gray-500'}`}>{s.label}</div>{i<filingWorkflowStages.length-1&&<div className="shrink-0 w-4 h-px bg-gray-300"></div>}</React.Fragment>)}</div></div>}<div className="grid grid-cols-1 lg:grid-cols-3 gap-4"><div className="bg-white rounded-xl border border-gray-200 p-4 card-hover"><h2 className="text-sm font-semibold text-gray-900 mb-3">Filing Details</h2><div className="space-y-2">{[['Form Type','10-Q'],['Registrant',COMPANY.name],['CIK',COMPANY.cik],['Period End',f.periodEnd],['Deadline',f.deadline],['Filer Category',COMPANY.filerCategory],['Fiscal Year End',COMPANY.fiscalYearEnd],['Accession #',f.accession]].map(([k,v],i)=><div key={i} className="flex justify-between text-[11px]"><span className="text-gray-500">{k}</span><span className="font-medium text-gray-800 text-right">{v}</span></div>)}</div>{ic&&<div className="mt-3 pt-3 border-t border-gray-100 flex gap-2"><button className="flex-1 bg-primary-600 hover:bg-primary-700 text-white text-[11px] font-medium py-1.5 rounded-lg transition-colors flex items-center justify-center gap-1"><Icons.Eye /> Preview</button><button className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 text-[11px] font-medium py-1.5 rounded-lg transition-colors flex items-center justify-center gap-1"><Icons.Download /> Export</button></div>}</div><div className="lg:col-span-2 space-y-3">{tenQParts.map((part,pi)=><div key={pi} className="bg-white rounded-xl border border-gray-200 overflow-hidden card-hover"><div className="px-4 py-2.5 bg-gray-50 border-b border-gray-100"><h3 className="text-xs font-semibold text-gray-700">{part.part}</h3></div><div className="divide-y divide-gray-50">{part.items.map((item,ii)=><div key={ii} className="px-4 py-3 hover:bg-gray-50 transition-colors cursor-pointer group"><div className="flex items-start justify-between gap-3"><div className="flex items-start gap-2.5 min-w-0">{ic?(item.status==='complete'?<div className="w-4 h-4 mt-0.5 rounded-full bg-emerald-500 flex items-center justify-center shrink-0"><span className="text-white"><svg className="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg></span></div>:<div className={`w-4 h-4 mt-0.5 rounded-full border-2 shrink-0 ${item.status==='in-progress'?'border-primary-400 bg-primary-50':'border-gray-300'}`}></div>):<div className="w-4 h-4 mt-0.5 rounded-full bg-emerald-500 flex items-center justify-center shrink-0"><span className="text-white"><svg className="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg></span></div>}<div className="min-w-0"><div className="flex items-center gap-2"><span className="text-[10px] font-mono font-semibold text-primary-600">{item.item}</span><span className="text-xs font-medium text-gray-800">{item.name}</span></div><p className="text-[11px] text-gray-500 mt-0.5 leading-relaxed">{item.desc}</p>{ic&&<div className="flex flex-wrap items-center gap-x-3 gap-y-1 mt-1.5"><span className="text-[10px] text-gray-400">Assignee: <span className="font-medium text-gray-600">{item.assignee}</span></span><span className="text-[10px] text-gray-400">Due: <span className="font-medium text-gray-600">{item.due}</span></span></div>}</div></div><div className="flex items-center gap-2 shrink-0 mt-0.5">{ic&&<span className={`hidden sm:inline px-2 py-px rounded-full text-[10px] font-medium ${getStatusColor(item.status)}`}>{getStatusLabel(item.status)}</span>}<span className="text-gray-300 group-hover:text-gray-500"><Icons.ArrowRight /></span></div></div></div>)}</div></div>)}</div></div></div>}

    // ══════════════════════════════════════════
    // XBRL TAGGING PAGE (fully interactive)
    // ══════════════════════════════════════════
    function XBRLTaggingPage() {
      // State
      const [mode, setMode] = useState('browse'); // browse | tagging | editing
      const [selectedElement, setSelectedElement] = useState(null); // taxonomy element id
      const [selectedTagId, setSelectedTagId] = useState(null);
      const [tags, setTags] = useState(initialTags);
      const [expandedNodes, setExpandedNodes] = useState({ 'us-gaap-bs': true });
      const [searchTerm, setSearchTerm] = useState('');
      const [activeDocSection, setActiveDocSection] = useState('balance-sheet');
      const [tagForm, setTagForm] = useState({ period: '2026-03-31', unit: 'USD', decimals: '-6' });
      const [toast, setToast] = useState(null);
      const [hoveredElement, setHoveredElement] = useState(null);

      const selectedTag = selectedTagId !== null ? tags.find(t => t.id === selectedTagId) : null;
      const selectedElemData = selectedElement ? taxonomyElements[selectedElement] : null;
      const tagForElement = selectedElement ? tags.find(t => t.concept === selectedElement) : null;

      // Show a toast notification
      const showToast = (msg, type='success') => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3000);
      };

      // Taxonomy element click
      const handleElementClick = (elemId) => {
        setSelectedElement(elemId);
        setMode('browse');
        const existingTag = tags.find(t => t.concept === elemId);
        if (existingTag) {
          setSelectedTagId(existingTag.id);
        } else {
          setSelectedTagId(null);
        }
        // Expand parent node
        const parent = findParentNode(elemId);
        if (parent) setExpandedNodes(prev => ({ ...prev, [parent.id]: true }));
      };

      // Enter tagging mode
      const handleApplyTag = () => {
        setMode('tagging');
        setTagForm({ period: '2026-03-31', unit: 'USD', decimals: '-6' });
      };

      // Click a value in the document
      const handleDocValueClick = (row) => {
        if (mode === 'tagging' && selectedElement) {
          // Create new tag
          const newTag = {
            id: Date.now(),
            concept: selectedElement,
            rowId: row.id,
            value: row.val1.replace(/[$,]/g, '') + '000000',
            displayValue: row.val1,
            period: tagForm.period,
            unit: tagForm.unit,
            decimals: tagForm.decimals,
            status: 'tagged',
          };
          setTags(prev => [...prev, newTag]);
          setSelectedTagId(newTag.id);
          setMode('browse');
          showToast(`Tagged "${row.label}" as ${selectedElement.split(':')[1]}`);
        } else {
          // Select existing tag for this row
          const tag = tags.find(t => t.rowId === row.id);
          if (tag) {
            setSelectedTagId(tag.id);
            setSelectedElement(tag.concept);
            setMode('browse');
            const parent = findParentNode(tag.concept);
            if (parent) setExpandedNodes(prev => ({ ...prev, [parent.id]: true }));
          }
        }
      };

      // Tag list click
      const handleTagListClick = (tagId) => {
        const tag = tags.find(t => t.id === tagId);
        setSelectedTagId(tagId);
        setSelectedElement(tag.concept);
        setMode('browse');
        const parent = findParentNode(tag.concept);
        if (parent) setExpandedNodes(prev => ({ ...prev, [parent.id]: true }));
      };

      // Edit tag
      const handleEditTag = () => {
        if (!selectedTag) return;
        setMode('editing');
        setTagForm({ period: selectedTag.period, unit: selectedTag.unit, decimals: selectedTag.decimals });
      };

      // Save edit
      const handleSaveEdit = () => {
        setTags(prev => prev.map(t => t.id === selectedTagId ? { ...t, period: tagForm.period, unit: tagForm.unit, decimals: tagForm.decimals, status: 'tagged' } : t));
        setMode('browse');
        showToast('Tag updated successfully');
      };

      // Remove tag
      const handleRemoveTag = () => {
        const concept = selectedTag?.concept;
        setTags(prev => prev.filter(t => t.id !== selectedTagId));
        setSelectedTagId(null);
        setMode('browse');
        showToast(`Removed tag ${concept?.split(':')[1] || ''}`, 'info');
      };

      // Cancel
      const handleCancel = () => {
        setMode('browse');
      };

      // ESC key handler
      useEffect(() => {
        const handler = (e) => { if (e.key === 'Escape') setMode('browse'); };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);

      const toggleNode = (id) => setExpandedNodes(prev => ({ ...prev, [id]: !prev[id] }));

      // Check if a row is tagged
      const getTagForRow = (rowId) => tags.find(t => t.rowId === rowId);
      const isRowTagged = (rowId) => !!getTagForRow(rowId);

      return (
        <div className="flex flex-col lg:flex-row gap-3 lg:h-[calc(100vh-7.5rem)] relative">
          {/* Toast */}
          {toast && (
            <div className={`toast-enter fixed top-20 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-lg shadow-lg text-xs font-medium ${toast.type==='success'?'bg-emerald-600 text-white':'bg-gray-700 text-white'}`}>
              {toast.msg}
            </div>
          )}

          {/* LEFT: Taxonomy Browser */}
          <div className="w-full lg:w-64 xl:w-72 shrink-0 bg-white rounded-xl border border-gray-200 flex flex-col overflow-hidden max-h-[50vh] lg:max-h-none lg:h-full">
            <div className="px-3 py-2.5 border-b border-gray-100">
              <h3 className="text-xs font-semibold text-gray-800 mb-2">US GAAP Taxonomy</h3>
              <div className="relative">
                <span className="absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400"><Icons.Search /></span>
                <input type="text" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} placeholder="Search elements..."
                  className="w-full pl-8 pr-3 py-1.5 bg-gray-50 border border-gray-200 rounded-lg text-[11px] focus:outline-none focus:ring-1 focus:ring-primary-400 focus:border-primary-400" />
              </div>
            </div>
            <div className="flex-1 overflow-y-auto p-2">
              {taxonomyTree.map(node => {
                const isExp = expandedNodes[node.id];
                const children = node.children.map(cId => ({ id: cId, ...taxonomyElements[cId] }));
                const filtered = searchTerm ? children.filter(c => c.label?.toLowerCase().includes(searchTerm.toLowerCase()) || c.id.toLowerCase().includes(searchTerm.toLowerCase())) : children;
                if (searchTerm && filtered.length === 0) return null;
                return (
                  <div key={node.id} className="mb-1">
                    <button onClick={() => toggleNode(node.id)}
                      className="w-full flex items-center gap-1.5 px-2 py-1 rounded text-left hover:bg-gray-50 transition-colors">
                      <svg className={`w-3 h-3 text-gray-400 transition-transform ${isExp||searchTerm?'rotate-90':''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7" /></svg>
                      <Icons.Folder />
                      <span className="text-[11px] font-medium text-gray-700 truncate">{node.label}</span>
                      <span className="text-[9px] text-gray-400 ml-auto shrink-0">{node.children.length}</span>
                    </button>
                    {(isExp || searchTerm) && (
                      <div className="ml-5 mt-0.5 space-y-px">
                        {filtered.map(child => {
                          const isTagged = tags.some(t => t.concept === child.id);
                          const isSelected = selectedElement === child.id;
                          return (
                            <button key={child.id} onClick={() => handleElementClick(child.id)}
                              onMouseEnter={() => setHoveredElement(child.id)}
                              onMouseLeave={() => setHoveredElement(null)}
                              className={`w-full flex items-center gap-1.5 px-2 py-1 rounded text-left text-[11px] transition-colors ${
                                isSelected ? 'bg-primary-100 text-primary-800 ring-1 ring-primary-300' :
                                isTagged ? 'bg-primary-50 text-primary-700 hover:bg-primary-100' :
                                'text-gray-600 hover:bg-gray-50'
                              }`}>
                              <Icons.Tag />
                              <span className="truncate">{child.label}</span>
                              {isTagged && <span className="ml-auto w-1.5 h-1.5 rounded-full bg-primary-500 shrink-0"></span>}
                            </button>
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            <div className="px-3 py-2 border-t border-gray-100 bg-gray-50">
              <div className="flex items-center justify-between text-[10px] text-gray-500">
                <span>us-gaap-2026</span>
                <span>{tags.length} tagged</span>
              </div>
            </div>
          </div>

          {/* CENTER: Document Viewer */}
          <div className="flex-1 bg-white rounded-xl border border-gray-200 flex flex-col overflow-hidden min-w-0 min-h-[40vh] lg:min-h-0">
            {/* Tagging mode banner */}
            {mode === 'tagging' && selectedElemData && (
              <div className="px-4 py-2 bg-primary-600 text-white flex items-center justify-between gap-2 shrink-0">
                <div className="flex items-center gap-2 min-w-0">
                  <Icons.Crosshair />
                  <span className="text-[11px] font-medium truncate">
                    Select a value to tag as <span className="font-bold">{selectedElement.split(':')[1]}</span>
                  </span>
                </div>
                <button onClick={handleCancel} className="shrink-0 text-[11px] bg-white/20 hover:bg-white/30 px-2.5 py-1 rounded-lg transition-colors">
                  Cancel (Esc)
                </button>
              </div>
            )}

            <div className="px-4 py-2.5 border-b border-gray-100 flex items-center justify-between gap-2">
              <div className="flex items-center gap-2 overflow-x-auto">
                {[['balance-sheet','Balance Sheet'],['income','Income Statement'],['cash-flows','Cash Flows']].map(([id,label])=>(
                  <button key={id} onClick={()=>setActiveDocSection(id)}
                    className={`shrink-0 px-2.5 py-1 rounded-lg text-[11px] font-medium transition-colors ${activeDocSection===id?'bg-primary-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                    {label}
                  </button>
                ))}
              </div>
              <div className="flex items-center gap-1.5 shrink-0">
                <button className="p-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-500 transition-colors" title="Download"><Icons.Download /></button>
              </div>
            </div>

            <div className={`flex-1 overflow-y-auto p-4 lg:p-5 ${mode==='tagging'?'cursor-crosshair':''}`}>
              <div className="max-w-2xl mx-auto">
                <h2 className="text-center text-sm font-bold text-gray-900 mb-0.5">AMAZON.COM, INC.</h2>
                <h3 className="text-center text-xs font-semibold text-gray-700 mb-0.5">CONDENSED CONSOLIDATED BALANCE SHEETS</h3>
                <p className="text-center text-[10px] text-gray-500 mb-4">(in millions, except per share data) (unaudited)</p>
                <table className="w-full text-xs border-collapse">
                  <thead>
                    <tr className="border-b-2 border-gray-800">
                      <th className="text-left py-1.5 font-semibold text-gray-700"></th>
                      <th className="text-right py-1.5 font-semibold text-gray-700 w-20 sm:w-28"><span className="xbrl-tag-date px-1 text-[10px] sm:text-xs whitespace-nowrap">Mar 31, 2026</span></th>
                      <th className="text-right py-1.5 font-semibold text-gray-700 w-20 sm:w-28 text-[10px] sm:text-xs whitespace-nowrap">Dec 31, 2025</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr><td colSpan="3" className="pt-2 pb-1 font-bold text-gray-800">ASSETS</td></tr>
                    <tr><td colSpan="3" className="py-0.5 font-semibold text-gray-700 text-[11px]">Current assets:</td></tr>
                    {docRows.map((row) => {
                      const tag = getTagForRow(row.id);
                      const isTagged = !!tag;
                      const isSelectedInDoc = selectedTag?.rowId === row.id;
                      const isHovered = hoveredElement === row.concept;
                      const canTag = mode === 'tagging' && !isTagged;

                      return (
                        <React.Fragment key={row.id}>
                          {row.sectionHeader && (
                            <React.Fragment>
                              <tr><td className="py-2" colSpan="3"></td></tr>
                              <tr><td colSpan="3" className="pt-1 pb-1 font-bold text-gray-800">{row.sectionHeader}</td></tr>
                              <tr><td colSpan="3" className="py-0.5 font-semibold text-gray-700 text-[11px]">Current liabilities:</td></tr>
                            </React.Fragment>
                          )}
                          {row.spaceBefore && !row.sectionHeader && <tr><td className="py-1.5" colSpan="3"></td></tr>}
                          <tr className={`${isHovered?'xbrl-row-hovered':''} ${canTag?'hover:bg-primary-50':'hover:bg-gray-50'} transition-colors cursor-pointer`}
                            style={row.borderTop==='double'?{borderTop:'3px double #1f2937'}:row.borderTop?{borderTop:'1px solid #d1d5db'}:{}}
                            onClick={() => { if (canTag || isTagged) handleDocValueClick(row); }}>
                            <td className={`py-1 ${row.indent===2?'pl-6':row.indent===1?'pl-4':''} ${row.bold?'font-bold text-gray-800':'text-gray-600'}`}>{row.label}</td>
                            <td className="py-1 text-right font-mono">
                              {isTagged ? (
                                <span className={`xbrl-tag-monetary px-1 ${isSelectedInDoc?'xbrl-tag-selected':''} ${isHovered?'xbrl-tag-hovered':''}`}>{row.val1}</span>
                              ) : canTag ? (
                                <span className="xbrl-taggable">{row.val1}</span>
                              ) : (
                                <span className={row.bold?'font-bold':''}>{row.val1}</span>
                              )}
                            </td>
                            <td className="py-1 text-right font-mono text-gray-500">{row.val2}</td>
                          </tr>
                        </React.Fragment>
                      );
                    })}
                  </tbody>
                </table>
                <p className="text-[9px] text-gray-400 mt-4 text-center">See accompanying notes to condensed consolidated financial statements.</p>
              </div>

                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div><label className="block text-[11px] font-medium text-gray-600 mb-1">CIK Number *</label><input type="text" value={form.cik} onChange={e=>update('cik',e.target.value)} placeholder="e.g. 0001018724" className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-400 focus:border-primary-400" /></div>
                    <div><label className="block text-[11px] font-medium text-gray-600 mb-1">SIC Code</label><input type="text" value={form.sic} onChange={e=>update('sic',e.target.value)} placeholder="e.g. 5961" className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-400 focus:border-primary-400" /></div>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div><label className="block text-[11px] font-medium text-gray-600 mb-1">State of Incorporation</label><input type="text" value={form.stateOfIncorp} onChange={e=>update('stateOfIncorp',e.target.value)} placeholder="e.g. Delaware" className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-400 focus:border-primary-400" /></div>

                      <select value={form.fiscalYearEnd} onChange={e=>update('fiscalYearEnd',e.target.value)} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-400 focus:border-primary-400 bg-white">

                    </div>
                  </div>

                      {['Large Accelerated Filer','Accelerated Filer','Non-Accelerated Filer','Smaller Reporting Company','Emerging Growth Company'].map(c=><option key={c} value={c}>{c}</option>)}

                  </div>
                  <div className="bg-primary-50 rounded-lg p-3 flex items-start gap-2">
                    <svg className="w-4 h-4 text-primary-600 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    <p className="text-[11px] text-primary-700 leading-relaxed">Your CIK number can be found on the <span className="font-semibold">SEC EDGAR</span> website. The filer category determines your filing deadlines (e.g. Large Accelerated Filers have 40 days for 10-Q, 60 days for 10-K).</p>
                  </div>
                </div>
              )}

              {/* Step 1: Filing Config */}
              {step === 1 && (
                <div className="space-y-4">
                  <div><label className="block text-[11px] font-medium text-gray-600 mb-2">Filing Type *</label>
                    <div className="grid grid-cols-2 gap-3">
                      {[['10-K','Annual Report','Full fiscal year financial statements, MD&A, audited by external auditors'],['10-Q','Quarterly Report','Condensed financials for the quarter, unaudited, with limited MD&A']].map(([type,title,desc])=>(
                        <button key={type} onClick={()=>update('filingType',type)}
                          className={`text-left p-4 rounded-xl border-2 transition-all ${form.filingType===type?'border-primary-400 bg-primary-50 ring-1 ring-primary-200':'border-gray-200 hover:border-gray-300'}`}>
                          <div className="text-sm font-bold text-gray-900">{type}</div>
                          <div className="text-xs font-medium text-gray-700 mt-0.5">{title}</div>
                          <p className="text-[10px] text-gray-500 mt-1 leading-relaxed">{desc}</p>
                        </button>
                      ))}
                    </div>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div><label className="block text-[11px] font-medium text-gray-600 mb-1">Reporting Period End Date *</label><input type="date" value={form.reportingPeriod} onChange={e=>update('reportingPeriod',e.target.value)} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-400 focus:border-primary-400" /></div>
                    <div><label className="block text-[11px] font-medium text-gray-600 mb-1">Filing Deadline</label>
                      <div className="px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm text-gray-600">
                        {form.reportingPeriod ? (() => { const d = new Date(form.reportingPeriod); d.setDate(d.getDate() + (form.filingType==='10-K'?60:40)); return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); })() : 'Select period end date'}
                      </div>
                    </div>
                  </div>
                  <div className="bg-amber-50 rounded-lg p-3 flex items-start gap-2">
                    <Icons.Warning />
                    <p className="text-[11px] text-amber-700 leading-relaxed"><span className="font-semibold">{form.filerCategory}</span> deadline: <span className="font-semibold">{form.filingType==='10-K'?'60':'40'} days</span> after period end. Amendments (10-K/A, 10-Q/A) have no fixed deadline but should be filed promptly.</p>
                  </div>
                </div>
              )}

              {/* Step 2: Data Import */}
              {step === 2 && (
                <div className="space-y-4">
                  <p className="text-xs text-gray-600 leading-relaxed">Import financial data from an existing XBRL filing on SEC EDGAR, upload an Excel workbook, or use both sources to cross-reference and triangulate your data.</p>
                  <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                    {[['xbrl','XBRL Link','Pull from SEC EDGAR','text-primary-600'],['excel','Excel Upload','Upload spreadsheet','text-emerald-600'],['both','Both Sources','Triangulate data','text-amber-600']].map(([method,title,desc,tc])=>(
                      <button key={method} onClick={()=>update('importMethod',method)}
                        className={`text-left p-4 rounded-xl border-2 transition-all ${form.importMethod===method?'border-primary-400 bg-primary-50 ring-1 ring-primary-200':'border-gray-200 hover:border-gray-300'}`}>
                        <div className={`text-sm font-bold ${tc}`}>{title}</div>
                        <p className="text-[10px] text-gray-500 mt-1">{desc}</p>
                      </button>
                    ))}
                  </div>

                  {(form.importMethod === 'xbrl' || form.importMethod === 'both') && (

                      <div className="flex items-center justify-between">
                        <h3 className="text-xs font-semibold text-gray-800">SEC EDGAR Filings — {form.companyName || 'Select a company'}</h3>

                      {!form.cik ? (
                        <div className="bg-amber-50 rounded-lg p-3 flex items-start gap-2">
                          <Icons.Warning />

                        </div>
                      ) : availableFilings.length === 0 ? (
                        <div className="bg-gray-50 rounded-lg p-4 text-center">
                          <p className="text-xs text-gray-500">No filings found for CIK {form.cik}.</p>

                          <input type="text" value={form.xbrlUrl} onChange={e=>update('xbrlUrl',e.target.value)}
                            placeholder="https://www.sec.gov/cgi-bin/browse-edgar?..."
                            className="w-full mt-3 px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-400 focus:border-primary-400" />
                        </div>
                      ) : !selectedFiling ? (
                        /* Filing list */
                        <div className="space-y-2">
                          <p className="text-[10px] text-gray-500">Select a previously filed disclosure to import as your starting point.</p>
                          {availableFilings.map(f => (
                            <button key={f.id} onClick={()=>setSelectedFiling(f)}
                              className="w-full text-left p-3 rounded-lg border border-gray-200 hover:border-primary-300 hover:bg-primary-50 transition-all group">
                              <div className="flex items-center justify-between">
                                <div className="flex items-center gap-2.5">
                                  <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${f.type==='10-K'?'bg-primary-100 text-primary-700':'bg-violet-100 text-violet-700'}`}>{f.type}</span>
                                  <span className="text-sm font-medium text-gray-900">{f.period}</span>
                                </div>
                                <div className="flex items-center gap-2">
                                  <span className="text-[10px] text-gray-400">Filed {f.filed}</span>
                                  <svg className="w-4 h-4 text-gray-300 group-hover:text-primary-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7"/></svg>
                                </div>
                              </div>
                              <div className="mt-1.5 flex items-center gap-3 text-[10px] text-gray-500">
                                <span>Revenue: {f.revenue}</span><span>&middot;</span>
                                <span>Net Income: {f.netIncome}</span><span>&middot;</span>
                                <span className="font-mono text-gray-400">{f.accession}</span>
                              </div>
                            </button>
                          ))}
                        </div>
                      ) : !filingConfirmed ? (
                        /* Filing preview */
                        <div className="space-y-3">
                          <button onClick={()=>setSelectedFiling(null)} className="flex items-center gap-1 text-[11px] text-primary-600 hover:text-primary-800 font-medium">
                            <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
                            Back to filing list
                          </button>
                          <div className="bg-gray-50 rounded-xl p-4 space-y-4">
                            <div className="flex items-start justify-between">
                              <div>
                                <div className="flex items-center gap-2">
                                  <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${selectedFiling.type==='10-K'?'bg-primary-100 text-primary-700':'bg-violet-100 text-violet-700'}`}>{selectedFiling.type}</span>
                                  <span className="text-sm font-bold text-gray-900">{form.companyName}</span>
                                </div>
                                <p className="text-[10px] text-gray-500 mt-1">Period ending {selectedFiling.period} &middot; Filed {selectedFiling.filed}</p>
                                <p className="text-[10px] font-mono text-gray-400 mt-0.5">Accession: {selectedFiling.accession}</p>
                              </div>
                              <span className="px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700 text-[10px] font-semibold">{selectedFiling.status}</span>
                            </div>

                            {/* Financial highlights */}
                            <div>
                              <h4 className="text-[11px] font-semibold text-gray-700 mb-2">Financial Highlights</h4>
                              <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                {[['Revenue',selectedFiling.revenue,'text-primary-700','bg-primary-50'],['Net Income',selectedFiling.netIncome,'text-emerald-700','bg-emerald-50'],['Total Assets',selectedFiling.totalAssets,'text-blue-700','bg-blue-50'],['Total Equity',selectedFiling.totalEquity,'text-indigo-700','bg-indigo-50'],['Shares Out.',selectedFiling.shares,'text-gray-700','bg-gray-100']].map(([label,val,tc,bg])=>(
                                  <div key={label} className={`${bg} rounded-lg p-2.5`}>
                                    <div className="text-[10px] text-gray-500">{label}</div>
                                    <div className={`text-sm font-bold ${tc}`}>{val}</div>
                                  </div>
                                ))}
                              </div>
                            </div>

                            {/* Included documents */}
                            <div>
                              <h4 className="text-[11px] font-semibold text-gray-700 mb-2">Documents Included</h4>
                              <div className="space-y-1">
                                {selectedFiling.items.map((item,i)=>(
                                  <div key={i} className="flex items-center gap-2 py-1.5 px-3 bg-white rounded-lg border border-gray-100">
                                    <svg className="w-3.5 h-3.5 text-emerald-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4"/></svg>
                                    <span className="text-xs text-gray-700">{item}</span>
                                  </div>
                                ))}
                              </div>
                            </div>

                            {/* XBRL tag count */}
                            <div className="bg-white rounded-lg border border-gray-100 p-3 flex items-center justify-between">
                              <div className="flex items-center gap-2">
                                <svg className="w-4 h-4 text-primary-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/></svg>
                                <div>
                                  <div className="text-xs font-medium text-gray-800">XBRL Taxonomy Tags</div>
                                  <div className="text-[10px] text-gray-500">US GAAP 2025 inline XBRL</div>
                                </div>
                              </div>
                              <span className="text-sm font-bold text-primary-700">{selectedFiling.type==='10-K' ? '1,847' : '892'} tags</span>
                            </div>
                          </div>

                          {/* Confirm / Cancel */}
                          <div className="flex items-center gap-3">
                            <button onClick={()=>{setFilingConfirmed(true);update('xbrlUrl',`https://www.sec.gov/Archives/edgar/data/${form.cik.replace(/^0+/,'')}/${selectedFiling.accession.replace(/-/g,'')}`);}}
                              className="flex-1 px-4 py-2.5 bg-primary-600 text-white rounded-lg text-sm font-semibold hover:bg-primary-700 transition-colors flex items-center justify-center gap-2">
                              <Icons.Check /> Use This Filing
                            </button>
                            <button onClick={()=>setSelectedFiling(null)}
                              className="px-4 py-2.5 border border-gray-200 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">
                              Cancel
                            </button>
                          </div>
                        </div>
                      ) : (
                        /* Confirmed state */
                        <div className="bg-emerald-50 rounded-xl p-4 space-y-3">
                          <div className="flex items-start justify-between">
                            <div className="flex items-center gap-2">
                              <div className="w-7 h-7 rounded-full bg-emerald-500 flex items-center justify-center"><svg className="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg></div>
                              <div>
                                <div className="text-sm font-semibold text-emerald-800">Filing Selected</div>
                                <div className="text-[10px] text-emerald-600">{selectedFiling.type} &middot; {selectedFiling.period} &middot; {selectedFiling.accession}</div>
                              </div>
                            </div>
                            <button onClick={()=>{setFilingConfirmed(false);setSelectedFiling(null);update('xbrlUrl','');}}
                              className="text-[10px] text-emerald-700 hover:text-emerald-900 font-medium">Change</button>
                          </div>
                          <div className="grid grid-cols-3 gap-2">
                            <div className="bg-white/60 rounded-lg p-2 text-center"><div className="text-[10px] text-gray-500">Revenue</div><div className="text-xs font-bold text-gray-800">{selectedFiling.revenue}</div></div>
                            <div className="bg-white/60 rounded-lg p-2 text-center"><div className="text-[10px] text-gray-500">Net Income</div><div className="text-xs font-bold text-gray-800">{selectedFiling.netIncome}</div></div>
                            <div className="bg-white/60 rounded-lg p-2 text-center"><div className="text-[10px] text-gray-500">Total Assets</div><div className="text-xs font-bold text-gray-800">{selectedFiling.totalAssets}</div></div>
                          </div>
                          <p className="text-[10px] text-emerald-700">Financial data, taxonomy mappings, and document structure will be imported in the next step.</p>
                        </div>
                      )}
                    </div>
                  )}

                  {(form.importMethod === 'excel' || form.importMethod === 'both') && (
                    <div className="bg-white rounded-xl border border-gray-200 p-4 space-y-3">
                      <h3 className="text-xs font-semibold text-gray-800">Excel Workbook</h3>
                      <p className="text-[10px] text-gray-500 leading-relaxed">Upload an Excel file (.xlsx) containing your financial statements. We support multi-sheet workbooks with separate tabs for Balance Sheet, Income Statement, and Cash Flows.</p>
                      {!form.excelFileName ? (
                        <button onClick={fakeExcelUpload}
                          className="w-full border-2 border-dashed border-gray-300 rounded-xl p-6 text-center hover:border-primary-400 hover:bg-primary-50 transition-colors group">
                          <div className="text-gray-400 group-hover:text-primary-500 mb-2"><svg className="w-8 h-8 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.5}><path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" /></svg></div>
                          <div className="text-xs font-medium text-gray-600 group-hover:text-primary-700">Click to upload or drag & drop</div>
                          <div className="text-[10px] text-gray-400 mt-0.5">.xlsx up to 25MB</div>
                        </button>
                      ) : (
                        <div className="bg-emerald-50 rounded-lg p-3 flex items-center justify-between">
                          <div className="flex items-center gap-2">
                            <svg className="w-5 h-5 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.5}><path strokeLinecap="round" strokeLinejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" /></svg>
                            <div><div className="text-xs font-medium text-emerald-800">{form.excelFileName}</div><div className="text-[10px] text-emerald-600">3 sheets detected: Balance Sheet, Income Statement, Cash Flows</div></div>
                          </div>
                          <button onClick={()=>{update('excelFile',null);update('excelFileName','')}} className="text-[10px] text-red-500 hover:text-red-700">Remove</button>
                        </div>
                      )}
                    </div>
                  )}

                  {form.importMethod === 'both' && (
                    <div className="bg-primary-50 rounded-lg p-3 flex items-start gap-2">
                      <Icons.Link />
                      <p className="text-[11px] text-primary-700 leading-relaxed"><span className="font-semibold">Triangulation mode:</span> Data from both sources will be cross-referenced. Discrepancies between the XBRL filing and your Excel data will be flagged for manual review in the next step.</p>
                    </div>
                  )}
                </div>
              )}

              {/* Step 3: Data Mapping */}
              {step === 3 && (
                <div className="space-y-4">
                  <p className="text-xs text-gray-600 leading-relaxed">Review the imported data and verify the mapping between your source data and XBRL taxonomy concepts. Resolve any discrepancies flagged during import.</p>
                  <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                    {[['142','Mapped','bg-emerald-50','text-emerald-700'],['8','Review','bg-amber-50','text-amber-700'],['3','Conflicts','bg-red-50','text-red-700'],['24','Unmapped','bg-gray-50','text-gray-600']].map(([v,l,bg,tc],i)=>(
                      <div key={i} className={`${bg} rounded-lg p-2.5 text-center`}><div className={`text-lg font-bold ${tc}`}>{v}</div><div className="text-[10px] text-gray-500 font-medium">{l}</div></div>
                    ))}
                  </div>
                  <div className="bg-white rounded-xl border border-gray-200 overflow-hidden">
                    <div className="px-4 py-2.5 bg-gray-50 border-b border-gray-100 flex items-center justify-between">
                      <h3 className="text-xs font-semibold text-gray-700">Data Preview</h3>
                      <span className="text-[10px] text-gray-400">Showing items requiring review</span>
                    </div>
                    <div className="divide-y divide-gray-50">
                      {[
                        { label: 'Total Revenue', source: '$180,200', xbrl: '$180,200', status: 'match', concept: 'RevenueFromContractWithCustomerExcludingAssessedTax' },
                        { label: 'Cost of Sales', source: '$108,345', xbrl: '$108,345', status: 'match', concept: 'CostOfGoodsAndServicesSold' },
                        { label: 'Operating Income', source: '$17,400', xbrl: '$17,421', status: 'conflict', concept: 'OperatingIncomeLoss' },
                        { label: 'Net Income', source: '$21,200', xbrl: '$21,200', status: 'match', concept: 'NetIncomeLoss' },
                        { label: 'Depreciation', source: '$14,800', xbrl: '—', status: 'unmapped', concept: 'DepreciationAndAmortization' },
                      ].map((row, i) => (
                        <div key={i} className="px-4 py-2.5 flex items-center justify-between gap-2 hover:bg-gray-50">
                          <div className="min-w-0">
                            <div className="text-xs font-medium text-gray-800">{row.label}</div>
                            <div className="text-[10px] font-mono text-gray-400">{row.concept}</div>
                          </div>
                          <div className="flex items-center gap-3 shrink-0 text-[11px]">
                            <span className="text-gray-600">{row.source}</span>
                            {row.status === 'conflict' && <span className="text-red-500 font-semibold">≠</span>}
                            {row.status === 'match' && <span className="text-emerald-500">=</span>}
                            {row.status === 'unmapped' && <span className="text-gray-300">—</span>}
                            <span className={row.status === 'conflict' ? 'text-red-600 font-semibold' : row.status === 'unmapped' ? 'text-gray-400' : 'text-gray-600'}>{row.xbrl}</span>
                            <span className={`px-1.5 py-px rounded-full text-[9px] font-medium ${row.status==='match'?'bg-emerald-100 text-emerald-700':row.status==='conflict'?'bg-red-100 text-red-700':'bg-gray-100 text-gray-500'}`}>
                              {row.status==='match'?'OK':row.status==='conflict'?'Review':'Map'}
                            </span>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="bg-amber-50 rounded-lg p-3 flex items-start gap-2">
                    <Icons.Warning />
                    <p className="text-[11px] text-amber-700 leading-relaxed"><span className="font-semibold">3 conflicts detected.</span> Operating Income differs by $21M between sources. Review these items before proceeding. Conflicts can also be resolved later during XBRL tagging.</p>
                  </div>
                </div>
              )}

              {/* Step 4: Taxonomy */}
              {step === 4 && (
                <div className="space-y-4">
                  <div><label className="block text-[11px] font-medium text-gray-600 mb-1">US GAAP Taxonomy Year</label>
                    <select value={form.taxonomyYear} onChange={e=>update('taxonomyYear',e.target.value)} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-400 focus:border-primary-400 bg-white">
                      {['2026','2025','2024','2023'].map(y=><option key={y} value={y}>{y}</option>)}
                    </select>
                  </div>
                  <div><label className="block text-[11px] font-medium text-gray-600 mb-2">Taxonomy Modules</label>
                    <div className="space-y-2">
                      {[
                        ['us-gaap','US GAAP','Core US Generally Accepted Accounting Principles taxonomy — required for all SEC filers.', true],
                        ['dei','Document & Entity Information','Entity identification, document type, period dates, and other filing metadata.', true],
                        ['srt','SEC Reporting Taxonomy','Supplemental taxonomy for SEC-specific reporting requirements including segment and geographic breakdowns.', true],
                        ['country','Country Codes','ISO 3166 country codes for geographic disaggregation of revenue and assets.',false],
                        ['currency','Currency Codes','ISO 4217 currency codes for multi-currency reporting.',false],
                        ['exch','Exchange Codes','Securities exchange codes for listing disclosures.',false],
                      ].map(([id,label,desc,required])=>(
                        <label key={id} className={`flex items-start gap-3 p-3 rounded-lg border transition-colors cursor-pointer ${form.taxonomyModules.includes(id)?'border-primary-300 bg-primary-50':'border-gray-200 hover:border-gray-300'}`}>
                          <input type="checkbox" checked={form.taxonomyModules.includes(id)} disabled={required}
                            onChange={() => {
                              if (required) return;
                              update('taxonomyModules', form.taxonomyModules.includes(id) ? form.taxonomyModules.filter(m=>m!==id) : [...form.taxonomyModules, id]);
                            }}
                            className="mt-0.5 rounded border-gray-300 text-primary-600 focus:ring-primary-400" />
                          <div>
                            <div className="text-xs font-semibold text-gray-800">{label} <span className="font-mono text-[10px] text-gray-400 ml-1">{id}</span>{required && <span className="text-[9px] text-primary-600 ml-1">Required</span>}</div>
                            <p className="text-[10px] text-gray-500 mt-0.5 leading-relaxed">{desc}</p>
                          </div>
                        </label>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* Step 5: Team */}
              {step === 5 && (
                <div className="space-y-4">
                  <p className="text-xs text-gray-600 leading-relaxed">Add team members who will collaborate on this disclosure. Assign roles to control access and workflow permissions.</p>
                  <div className="space-y-3">
                    {form.teamMembers.map((member, i) => (
                      <div key={i} className="bg-white rounded-xl border border-gray-200 p-4">
                        <div className="flex items-center justify-between mb-3">
                          <span className="text-[11px] font-semibold text-gray-700">Member {i + 1}</span>
                          {form.teamMembers.length > 1 && <button onClick={() => removeTeamMember(i)} className="text-[10px] text-red-500 hover:text-red-700">Remove</button>}
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                          <div><label className="block text-[10px] font-medium text-gray-500 mb-0.5">Name</label><input type="text" value={member.name} onChange={e=>updateTeamMember(i,'name',e.target.value)} placeholder="Full name" className="w-full px-3 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-primary-400" /></div>
                          <div><label className="block text-[10px] font-medium text-gray-500 mb-0.5">Email</label><input type="email" value={member.email} onChange={e=>updateTeamMember(i,'email',e.target.value)} placeholder="email@company.com" className="w-full px-3 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-primary-400" /></div>
                          <div><label className="block text-[10px] font-medium text-gray-500 mb-0.5">Role</label>
                            <select value={member.role} onChange={e=>updateTeamMember(i,'role',e.target.value)} className="w-full px-3 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-primary-400 bg-white">
                              {['Preparer','Reviewer','XBRL Tagger','Approver','Admin'].map(r=><option key={r} value={r}>{r}</option>)}
                            </select>
                          </div>
                        </div>
                      </div>
                    ))}
                    <button onClick={addTeamMember} className="w-full py-2.5 border-2 border-dashed border-gray-300 rounded-xl text-xs font-medium text-gray-500 hover:border-primary-400 hover:text-primary-600 hover:bg-primary-50 transition-colors flex items-center justify-center gap-1">
                      <Icons.Plus /> Add Team Member
                    </button>
                  </div>
                  <div className="bg-gray-50 rounded-lg p-3">
                    <h4 className="text-[11px] font-semibold text-gray-700 mb-2">Role Permissions</h4>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 text-[10px] text-gray-500">
                      {[['Preparer','Draft and edit disclosure sections'],['Reviewer','Review and comment on submissions'],['XBRL Tagger','Apply and edit XBRL taxonomy tags'],['Approver','Final approval before SEC filing'],['Admin','Full access including settings and team management']].map(([r,d])=>(
                        <div key={r} className="flex gap-1.5"><span className="font-semibold text-gray-700">{r}:</span>{d}</div>
                      ))}
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* Footer */}
          <div className="bg-white border-t border-gray-200 px-4 lg:px-8 py-3 shrink-0">
            <div className="max-w-2xl mx-auto flex items-center justify-between">
              <button onClick={() => step > 0 ? setStep(step - 1) : tryExit()}
                className="px-4 py-2 text-xs font-medium text-gray-600 hover:text-gray-800 transition-colors">
                {step === 0 ? 'Cancel' : 'Back'}
              </button>
              <div className="flex items-center gap-2">
                <span className="text-[10px] text-gray-400">Step {step + 1} of {steps.length}</span>
                {step < steps.length - 1 ? (
                  <button onClick={() => setStep(step + 1)} disabled={!canNext()}
                    className={`px-5 py-2 rounded-lg text-xs font-semibold transition-colors ${canNext()?'bg-primary-600 hover:bg-primary-700 text-white':'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
                    Continue
                  </button>
                ) : (
                  <button onClick={()=> onComplete ? onComplete(form) : onCancel()}
                    className="px-5 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-lg text-xs font-semibold transition-colors">
                    Create Disclosure
                  </button>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════
    function PlaceholderPage({title,desc}){return<div className="flex items-center justify-center h-64"><div className="text-center"><h2 className="text-lg font-semibold text-gray-800 mb-1">{title}</h2><p className="text-sm text-gray-500">{desc}</p></div></div>}

    function App() {
      const [activePage, setActivePage] = useState('dashboard');
      const [mobileOpen, setMobileOpen] = useState(false);
      const [showNewCompany, setShowNewCompany] = useState(false);
      const [selectedCompany, setSelectedCompany] = useState(0);
      const [companies, setCompanies] = useState(companyList);
      const wizardDirtyRef = useRef(false);
      const wizardExitCbRef = useRef(null);
      const guardedCloseWizard = (cb) => {
        if (showNewCompany && wizardDirtyRef.current) {
          wizardExitCbRef.current = cb;
          // trigger the wizard's modal via a ref callback
          if (wizardTryExitRef.current) wizardTryExitRef.current();
          return;
        }
        setShowNewCompany(false);
        if (cb) cb();
      };
      const wizardTryExitRef = useRef(null);
      const handleNewCompanyComplete = (formData) => {
        const colors = ['bg-primary-900','bg-gray-800','bg-emerald-700','bg-red-600','bg-rose-700','bg-blue-600','bg-green-600','bg-blue-900','bg-red-700','bg-blue-700','bg-indigo-900','bg-sky-700','bg-violet-700','bg-teal-700','bg-orange-700'];
        const newCompany = {
          name: formData.companyName, ticker: formData.ticker, initial: formData.ticker.charAt(0),
          color: colors[companies.length % colors.length],
          logo: `https://logo.clearbit.com/${formData.companyName.toLowerCase().replace(/[^a-z0-9]/g,'').replace(/(inc|corp|co|ltd|llc|plc|group)$/,'')}.com`,
          cik: formData.cik, sic: formData.sic, stateOfIncorp: formData.stateOfIncorp,
          fiscalYearEnd: formData.fiscalYearEnd, filerCategory: formData.filerCategory,
        };
        const updated = [...companies, newCompany];
        setCompanies(updated);
        setSelectedCompany(updated.length - 1);
        setShowNewCompany(false);
        setActivePage('dashboard');
      };
      const currentCompany = companies[selectedCompany] || companies[0];
      const displayName = currentCompany.name;
      const pageTitles = {
        'dashboard': ['Disclosure Dashboard', `${displayName} \u00b7 Disclosure Management`],
        'filings-10q': ['10-Q Filings', `${displayName} \u00b7 Quarterly Report Management`],
        'filings-10k': ['10-K Filings', `${displayName} \u00b7 Annual Report Management`],
        'financial-statements': ['Financial Statements', 'Review and manage condensed consolidated statements'],
        'notes': ['Notes to Financial Statements', 'Disclosure notes and XBRL tagging'],
        'xbrl-tagging': ['XBRL Tagging', `${displayName} \u00b7 Tag financial data with US GAAP taxonomy`],
        'validation': ['Validation', 'XBRL validation rules and error resolution'],
        'settings': ['Settings', 'Application and filing configuration'],
      };
      const [title, subtitle] = pageTitles[activePage] || ['Page', ''];
      const renderPage = () => { switch(activePage){ case 'dashboard':return <DashboardPage/>;case 'filings-10q':return <FilingsPage/>;case 'filings-10k':return <TenKFilingsPage/>;case 'xbrl-tagging':return <XBRLTaggingPage/>;default:return <PlaceholderPage title={title} desc="This section is under development."/>; }};
      return (
        <div className="flex min-h-screen bg-gray-50">
          <Sidebar activePage={activePage} onNavigate={(p)=>{if(showNewCompany){guardedCloseWizard(()=>{setActivePage(p);setShowNewCompany(false);});}else{setActivePage(p);}}} mobileOpen={mobileOpen} onMobileClose={()=>setMobileOpen(false)} onNewCompany={()=>setShowNewCompany(true)} selectedCompany={selectedCompany} onSelectCompany={setSelectedCompany} companies={companies} />
          {showNewCompany ? (
            <div className="flex-1 lg:ml-60"><NewCompanySetup onCancel={()=>{const cb=wizardExitCbRef.current;wizardExitCbRef.current=null;setShowNewCompany(false);if(cb)cb();}} onComplete={handleNewCompanyComplete} wizardDirtyRef={wizardDirtyRef} wizardTryExitRef={wizardTryExitRef} /></div>
          ) : (
            <div className="flex-1 lg:ml-60 flex flex-col min-h-screen">
              <Header title={title} subtitle={subtitle} onMenuClick={()=>setMobileOpen(true)} />
              <main className={`flex-1 p-3 sm:p-4 lg:p-5 overflow-y-auto ${activePage==='xbrl-tagging'?'p-3 sm:p-3 lg:p-4':''}`}>{renderPage()}</main>
            </div>
          )}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
