ce-y-2">{[['Form Type','10-Q'],['Registrant',COMPANY.name],['CIK',COMPANY.cik],['Period End',f.periodEnd],['Deadline',f.deadline],['Filer Category',COMPANY.filerCategory],['Fiscal Year End',COMPANY.fiscalYearEnd],['Accession #',f.accession]].map(([k,v],i)=><div key={i} className="flex justify-between text-[11px]"><span className="text-gray-500">{k}</span><span className="font-medium text-gray-800 text-right">{v}</span></div>)}</div>{ic&&<div className="mt-3 pt-3 border-t border-gray-100 flex gap-2"><button className="flex-1 bg-primary-600 hover:bg-primary-700 text-white text-[11px] font-medium py-1.5 rounded-lg transition-colors flex items-center justify-center gap-1"><Icons.Eye /> Preview</button><button className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 text-[11px] font-medium py-1.5 rounded-lg transition-colors flex items-center justify-center gap-1"><Icons.Download /> Export</button></div>}</div><div className="lg:col-span-2 space-y-3">{tenQParts.map((part,pi)=><div key={pi} className="bg-white rounded-xl border border-gray-200 overflow-hidden card-hover"><div className="px-4 py-2.5 bg-gray-50 border-b border-gray-100"><h3 className="text-xs font-semibold text-gray-700">{part.part}</h3></div><div className="divide-y divide-gray-50">{part.items.map((item,ii)=><div key={ii} className="px-4 py-3 hover:bg-gray-50 transition-colors cursor-pointer group"><div className="flex items-start justify-between gap-3"><div className="flex items-start gap-2.5 min-w-0">{ic?(item.status==='complete'?<div className="w-4 h-4 mt-0.5 rounded-full bg-emerald-500 flex items-center justify-center shrink-0"><span className="text-white"><svg className="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg></span></div>:<div className={`w-4 h-4 mt-0.5 rounded-full border-2 shrink-0 ${item.status==='in-progress'?'border-primary-400 bg-primary-50':'border-gray-300'}`}></div>):     // ══════════════════════════════════════════
    // XBRL TAGGING PAGE (fully interactive)
    // ══════════════════════════════════════════
    function XBRLTaggingPage() {
      // State
      const [mode, setMode] = useState('browse'); // browse | tagging | editing
      const [selectedElement, setSelectedElement] = useState(null); // taxonomy element id
      const [selectedTagId, setSelectedTagId] = useState(null);
      const [tags, setTags] = useState(initialTags);
      const [expandedNodes, setExpandedNodes] = useState({ 'us-gaap-bs': true });
      const [searchTerm, setSearchTerm] = useState('');
      const [activeDocSection, setActiveDocSection] = useState('balance-sheet');
      const [tagForm, setTagForm] = useState({ period: '2026-03-31', unit: 'USD', decimals: '-6' });
      const [toast, setToast] = useState(null);
      const [hoveredElement, setHoveredElement] = useState(null);

      const selectedTag = selectedTagId !== null ? tags.find(t => t.id === selectedTagId) : null;
      const selectedElemData = selectedElement ? taxonomyElements[selectedElement] : null;
      const tagForElement = selectedElement ? tags.find(t => t.concept === selectedElement) : null;

      // Show a toast notification
      const showToast = (msg, type='success') => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3000);
      };

      // Taxonomy element click
      const handleElementClick = (elemId) => {
        setSelectedElement(elemId);
        setMode('browse');
        const existingTag = tags.find(t => t.concept === elemId);
        if (existingTag) {
          setSelectedTagId(existingTag.id);
        } else {
          setSelectedTagId(null);
        }
        // Expand parent node
        const parent = findParentNode(elemId);
        if (parent) setExpandedNodes(prev => ({ ...prev, [parent.id]: true }));
      };

      // Enter tagging mode
      const handleApplyTag = () => {
        setMode('tagging');
        setTagForm({ period: '2026-03-31', unit: 'USD', decimals: '-6' });
      };

      // Click a value in the document
      const handleDocValueClick = (row) => {
        if (mode === 'tagging' && selectedElement) {
          // Create new tag
          const newTag = {
            id: Date.now(),
            concept: selectedElement,
            rowId: row.id,
            value: row.val1.replace(/[$,]/g, '') + '000000',
            displayValue: row.val1,
            period: tagForm.period,
            unit: tagForm.unit,
            decimals: tagForm.decimals,
            status: 'tagged',
          };
          setTags(prev => [...prev, newTag]);
          setSelectedTagId(newTag.id);
          setMode('browse');
          showToast(`Tagged "${row.label}" as ${selectedElement.split(':')[1]}`);
        } else {
          // Select existing tag for this row
          const tag = tags.find(t => t.rowId === row.id);
          if (tag) {
            setSelectedTagId(tag.id);
            setSelectedElement(tag.concept);
            setMode('browse');
            const parent = findParentNode(tag.concept);
            if (parent) setExpandedNodes(prev => ({ ...prev, [parent.id]: true }));
          }
        }
      };

      // Tag list click
      const handleTagListClick = (tagId) => {
        const tag = tags.find(t => t.id === tagId);
        setSelectedTagId(tagId);
        setSelectedElement(tag.concept);
        setMode('browse');
        const parent = findParentNode(tag.concept);
        if (parent) setExpandedNodes(prev => ({ ...prev, [parent.id]: true }));
      };

      // Edit tag
      const handleEditTag = () => {
        if (!selectedTag) return;
        setMode('editing');
        setTagForm({ period: selectedTag.period, unit: selectedTag.unit, decimals: selectedTag.decimals });
      };

      // Save edit
      const handleSaveEdit = () => {
        setTags(prev => prev.map(t => t.id === selectedTagId ? { ...t, period: tagForm.period, unit: tagForm.unit, decimals: tagForm.decimals, status: 'tagged' } : t));
        setMode('browse');
        showToast('Tag updated successfully');
      };

      // Remove tag
      const handleRemoveTag = () => {
        const concept = selectedTag?.concept;
        setTags(prev => prev.filter(t => t.id !== selectedTagId));
        setSelectedTagId(null);
        setMode('browse');
        showToast(`Removed tag ${concept?.split(':')[1] || ''}`, 'info');
      };

      // Cancel
      const handleCancel = () => {
        setMode('browse');
      };

      // ESC key handler
      useEffect(() => {
        const handler = (e) => { if (e.key === 'Escape') setMode('browse'); };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);

      const toggleNode = (id) => setExpandedNodes(prev => ({ ...prev, [id]: !prev[id] }));

      // Check if a row is tagged
      const getTagForRow = (rowId) => tags.find(t => t.rowId === rowId);
      const isRowTagged = (rowId) => !!getTagForRow(rowId);

      return (
        <div className="flex flex-col lg:flex-row gap-3 lg:h-[calc(100vh-7.5rem)] relative">
          {/* Toast */}
          {toast && (
            <div className={`toast-enter fixed top-20 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-lg shadow-lg text-xs font-medium ${toast.type==='success'?'bg-emerald-600 text-white':'bg-gray-700 text-white'}`}>
              {toast.msg}
            </div>
          )}

          {/* LEFT: Taxonomy Browser */}
          <div className="w-full lg:w-64 xl:w-72 shrink-0 bg-white rounded-xl border border-gray-200 flex flex-col overflow-hidden max-h-[50vh] lg:max-h-none lg:h-full">

        { label: 'Unearned revenue', key: 'ur', indent: 1, tag: 'us-gaap:ContractWithCustomerLiabilityCurrent' },
        { label: 'Total current liabilities', key: 'tcl', indent: 0, bold: true, bt: true, tag: 'us-gaap:LiabilitiesCurrent' },
        { label: 'Long-term debt', key: 'ltd', indent: 1, sb: true, tag: 'us-gaap:LongTermDebtNoncurrent' },
        { label: 'Operating lease liabilities', key: 'oll', indent: 1, tag: 'us-gaap:OperatingLeaseLiabilityNoncurrent' },
        { label: 'Other long-term liabilities', key: 'olt', indent: 1, tag: 'us-gaap:OtherLiabilitiesNoncurrent' },
        { label: 'Total liabilities', key: 'tl', indent: 0, bold: true, bt: true, tag: 'us-gaap:Liabilities' },
        { label: 'Total stockholders\u2019 equity', key: 'se', indent: 0, bold: true, sb: true, tag: 'us-gaap:StockholdersEquity' },
        { label: 'Total liabilities and stockholders\u2019 equity', key: 'tle', indent: 0, bold: true, btd: true, tag: 'us-gaap:LiabilitiesAndStockholdersEquity' },
      ];

      // Count checklist progress for in-progress filing
      const allItems = tenKParts.flatMap(p => p.items);
      const completedItems = allItems.filter(i => i.status === 'complete').length;
      const inProgressItems = allItems.filter(i => i.status === 'in-progress').length;
      const notStartedItems = allItems.filter(i => i.status === 'not-started').length;

      return (
        <div className="space-y-4">
          {/* Filing selector cards */}
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
            {tenKFilings.map((x, i) => (
              <button key={i} onClick={() => setSf(i)} className={`text-left p-3 rounded-xl border transition-all ${sf === i ? 'border-primary-400 bg-primary-50 ring-1 ring-primary-200' : 'border-gray-200 bg-white hover:border-gray-300 card-hover'}`}>
                <div className="flex items-center justify-between mb-1">
                  <span className="text-xs font-semibold text-gray-800">{x.period}</span>
                  <span className={`px-1.5 py-px rounded-full text-[9px] font-medium ${x.status==='filed'?'bg-emerald-100 text-emerald-700':'bg-primary-100 text-primary-700'}`}>{x.status==='filed'?'Filed':'In Progress'}</span>
                </div>
                <div className="text-[10px] text-gray-400">Period: {x.periodEnd}</div>
                <div className="text-[10px] text-gray-400">{x.status==='filed'?'Filed: '+x.filingDate:'Deadline: '+x.deadline}</div>
                <div className="mt-2 h-1 bg-gray-100 rounded-full overflow-hidden"><div className={`h-full rounded-full ${x.status==='filed'?'bg-emerald-500':'bg-primary-500'}`} style={{width:`${x.pct}%`}}></div></div>
              </button>
            ))}
          </div>

          {/* Workflow stages (in-progress only) */}
          {ic && (
            <div className="bg-white rounded-xl border border-gray-200 p-4">
              <h2 className="text-sm font-semibold text-gray-900 mb-3">Filing Workflow</h2>
              <div className="flex items-center gap-1 overflow-x-auto pb-1">
                {tenKWorkflowStages.map((s, i) => (
                  <React.Fragment key={i}>
                    <div className={`shrink-0 px-3 py-1.5 rounded-lg text-[11px] font-medium ${s.status==='active'?'bg-primary-600 text-white':s.status==='complete'?'bg-emerald-100 text-emerald-700':'bg-gray-100 text-gray-500'}`}>{s.label}</div>
                    {i < tenKWorkflowStages.length - 1 && <div className="shrink-0 w-4 h-px bg-gray-300"></div>}
                  </React.Fragment>
                ))}
              </div>
            </div>
          )}

          {/* Financial highlights (filed filings only) */}
          {!ic && f.revenue && (
            <>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                {[{l:'Net Revenue',v:f.revenue},{l:'Net Income',v:f.netIncome},{l:'Operating Income',v:f.operatingIncome},{l:'Earnings Per Share',v:f.eps}].map((m,i)=>(
                  <div key={i} className="bg-white rounded-xl border border-gray-200 p-3 card-hover">
                    <div className="text-[10px] text-gray-400 font-medium">{m.l}</div>
                    <div className="text-lg font-bold text-gray-900">{m.v}</div>
                  </div>
                ))}
              </div>
              <div className="bg-white rounded-xl border border-gray-200 p-4 card-hover">
                <h2 className="text-sm font-semibold text-gray-900 mb-3">Revenue by Segment</h2>
                <div className="grid grid-cols-3 gap-3">
                  {[{l:'North America',v:f.segments.na,bg:'bg-primary-50',tc:'text-primary-700'},{l:'International',v:f.segments.intl,bg:'bg-emerald-50',tc:'text-emerald-700'},{l:'AWS',v:f.segments.aws,bg:'bg-amber-50',tc:'text-amber-700'}].map((s,i)=>(
                    <div key={i} className={`${s.bg} rounded-lg p-2.5 sm:p-3 text-center`}>
                      <div className="text-[10px] text-gray-500 font-medium">{s.l}</div>
                      <div className={`text-base font-bold ${s.tc}`}>{s.v}</div>
                    </div>
                  ))}
                </div>
              </div>
            </>
          )}

          {/* Deadline countdown (in-progress only) */}
          {ic && (
            <div className="bg-white rounded-xl border border-gray-200 p-4 card-hover">
              <div className="flex flex-col sm:flex-row sm:items-start sm:justify-between mb-4 gap-2">
                <div>
                  <h2 className="text-sm font-semibold text-gray-900">Annual Report Timeline</h2>
                  <p className="text-xs text-gray-500 mt-0.5">10-K for fiscal year ending {f.periodEnd}</p>
                </div>
                <div className="flex items-center gap-1.5 text-primary-700 shrink-0">
                  <Icons.Calendar />
                  <div>
                    <span className="text-xs font-semibold">{f.deadline}</span>
                    <p className="text-[10px] text-gray-400">SEC Deadline (60 days)</p>
                  </div>
                </div>
              </div>
              <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3 mb-4">
                <div className="bg-primary-600 text-white rounded-xl px-4 py-2.5 text-center shrink-0 w-full sm:w-auto">
                  <div className="text-xl font-bold">290</div>
                  <div className="text-[10px] font-medium text-primary-200">days left</div>
                </div>
                <div className="flex-1 grid grid-cols-3 gap-2 w-full">
                  {[{v:'290',l:'to FY close'},{v:'335',l:'to audit done'},{v:'350',l:'to filing'}].map((x,i)=>(
                    <div key={i} className="bg-gray-50 rounded-lg px-2 py-1.5 text-center">
                      <div className="text-sm sm:text-base font-bold text-gray-800">{x.v}</div>
                      <div className="text-[9px] text-gray-400 font-medium">{x.l}</div>
                    </div>
                  ))}
                </div>
              </div>
              <div className="relative">
                <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                  <div className="h-full bg-primary-500 rounded-full progress-bar" style={{width:`${f.pct}%`}}></div>
                </div>
                <div className="flex justify-between mt-1.5 overflow-x-auto gap-1">
                  {['FY Ends|Dec 31','Audit Done|Jan 20','XBRL Tag|Feb 5','Review|Feb 18','Filing|Mar 1'].map((m,i)=>{const[l,dd]=m.split('|');return<div key={i} className="text-center shrink-0 min-w-0"><div className="text-[8px] sm:text-[9px] font-semibold text-gray-600 whitespace-nowrap">{l}</div><div className="text-[8px] sm:text-[9px] text-gray-400">{dd}</div></div>})}
                </div>
              </div>
            </div>
          )}

          {/* Completion summary (in-progress only) */}
          {ic && (
            <div className="bg-white rounded-xl border border-gray-200 p-4 card-hover">
              <h2 className="text-sm font-semibold text-gray-900 mb-3">Checklist Progress</h2>
              <div className="flex items-center gap-4">
                <div className="relative w-20 h-20 shrink-0">
                  <svg className="w-20 h-20 -rotate-90" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="42" fill="none" stroke="#f1f5f9" strokeWidth="8"/>
                    <circle cx="50" cy="50" r="42" fill="none" stroke="#3B82F6" strokeWidth="8" strokeLinecap="round" strokeDasharray={`${Math.round((completedItems/allItems.length)*264)} ${264-Math.round((completedItems/allItems.length)*264)}`} className="transition-all duration-1000"/>
                  </svg>
                  <div className="absolute inset-0 flex flex-col items-center justify-center">
                    <span className="text-lg font-bold text-gray-900">{completedItems}/{allItems.length}</span>
                    <span className="text-[9px] text-gray-400 font-medium">items</span>
                  </div>
                </div>
                <div className="flex-1 space-y-2">
                  {[['Complete','bg-emerald-500',completedItems],['In Progress','bg-primary-500',inProgressItems],['Not Started','bg-gray-300',notStartedItems]].map(([l,c,v],i)=>(
                    <div key={i} className="flex items-center justify-between">
                      <div className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full ${c}`}></div><span className="text-[11px] text-gray-600">{l}</span></div>
                      <span className="text-[11px] font-semibold text-gray-800">{v}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            {/* Filing details */}
            <div className="bg-white rounded-xl border border-gray-200 p-4 card-hover">
              <h2 className="text-sm font-semibold text-gray-900 mb-3">Filing Details</h2>
              <div className="space-y-2">
                {[['Form Type','10-K'],['Registrant',COMPANY.name],['CIK',COMPANY.cik],['Period End',f.periodEnd],['Deadline',f.deadline],['Filer Category',COMPANY.filerCategory],['Fiscal Year End',COMPANY.fiscalYearEnd],['Accession #',f.accession]].concat(f.filingDate?[['Filing Date',f.filingDate]]:[]).map(([k,v],i)=>(
                  <div key={i} className="flex justify-between text-[11px]">
                    <span className="text-gray-500">{k}</span>
                    <span className="font-medium text-gray-800 text-right">{v}</span>
                  </div>
                ))}
              </div>
              {ic && (
                <div className="mt-3 pt-3 border-t border-gray-100 flex gap-2">
                  <button className="flex-1 bg-primary-600 hover:bg-primary-700 text-white text-[11px] font-medium py-1.5 rounded-lg transition-colors flex items-center justify-center gap-1"><Icons.Eye /> Preview</button>
                  <button className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 text-[11px] font-medium py-1.5 rounded-lg transition-colors flex items-center justify-center gap-1"><Icons.Download /> Export</button>
                </div>
              )}
              {!ic && (
                <div className="mt-3 pt-3 border-t border-gray-100 flex gap-2">
                  <button className="flex-1 bg-primary-600 hover:bg-primary-700 text-white text-[11px] font-medium py-1.5 rounded-lg transition-colors flex items-center justify-center gap-1"><Icons.Eye /> View on EDGAR</button>
                  <button className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 text-[11px] font-medium py-1.5 rounded-lg transition-colors flex items-center justify-center gap-1"><Icons.Download /> Export</button>
                </div>
              )}
            </div>

            {/* Balance Sheet (filed) or Parts checklist panel (in-progress) */}
            <div className="lg:col-span-2 space-y-3">
              {!ic && f.bs && (
                <div className="bg-white rounded-xl border border-gray-200 overflow-hidden card-hover">
                  <div className="px-4 py-2.5 bg-gray-50 border-b border-gray-100 flex items-center justify-between">
                    <h3 className="text-xs font-semibold text-gray-700">Consolidated Balance Sheets</h3>
                    <span className="text-[10px] text-gray-400">In millions</span>
                  </div>
                  <div className="overflow-x-auto -mx-1 px-1">
                    <table className="w-full text-[10px] sm:text-[11px]">
                      <thead>
                        <tr className="border-b border-gray-200">
                          <th className="text-left px-2 sm:px-4 py-2 font-medium text-gray-500"></th>
                          <th className="text-right px-2 sm:px-4 py-2 font-medium text-gray-600 whitespace-nowrap">{f.periodEnd}</th>
                          <th className="text-right px-2 sm:px-4 py-2 font-medium text-gray-600 whitespace-nowrap">{f.priorLabel}</th>
                          <th className="text-right px-2 sm:px-4 py-2 font-medium text-gray-400 whitespace-nowrap hidden md:table-cell">XBRL Tag</th>
                        </tr>
                      </thead>
                      <tbody>
                        {bsRows.map((row, i) => {
                          if (row.section) return (
                            <tr key={i}><td colSpan={4} className="px-2 sm:px-4 pt-3 pb-1 text-[10px] font-semibold text-gray-500 uppercase tracking-wider">{row.label}</td></tr>
                          );
                          const isHovered = hoveredTag === row.tag;
                          return (
                            <tr key={i}
                              onMouseEnter={() => setHoveredTag(row.tag)}
                              onMouseLeave={() => setHoveredTag(null)}
                              className={`${row.sb ? 'border-t border-gray-50' : ''} ${row.btd ? 'border-t-2 border-gray-300' : row.bt ? 'border-t border-gray-200' : ''} ${isHovered ? 'bg-primary-50' : 'hover:bg-gray-50'} transition-colors`}>
                              <td className={`px-2 sm:px-4 py-1 ${row.bold ? 'font-semibold text-gray-800' : 'text-gray-600'}`} style={{paddingLeft:`${8 + (row.indent || 0) * 12}px`}}>{row.label}</td>
                              <td className={`text-right px-2 sm:px-4 py-1 whitespace-nowrap ${row.bold ? 'font-semibold text-gray-800' : 'text-gray-700'}`}>{fmt(f.bs[row.key])}</td>
                              <td className={`text-right px-2 sm:px-4 py-1 whitespace-nowrap ${row.bold ? 'font-semibold text-gray-800' : 'text-gray-700'}`}>{fmt(f.bsPrior[row.key])}</td>
                              <td className="text-right px-2 sm:px-4 py-1 hidden md:table-cell">
                                <span className={`font-mono text-[9px] px-1.5 py-0.5 rounded ${isHovered ? 'bg-primary-100 text-primary-700' : 'text-gray-400'}`}>{row.tag.split(':')[1]}</span>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                  <div className="px-4 py-2 border-t border-gray-100">
                    <p className="text-[9px] text-gray-400">Source: Amazon.com, Inc. Annual Report on Form 10-K filed with SEC EDGAR (Accession: {f.accession})</p>
                  </div>
                </div>
              )}

              {/* Parts checklist - always shown */}
              {tenKParts.map((part, pi) => (
                <div key={pi} className="bg-white rounded-xl border border-gray-200 overflow-hidden card-hover">
                  <div className="px-4 py-2.5 bg-gray-50 border-b border-gray-100">
                    <h3 className="text-xs font-semibold text-gray-700">{part.part}</h3>
                  </div>
                  <div className="divide-y divide-gray-50">
                    {part.items.map((item, ii) => (
                      <div key={ii} className="px-4 py-3 hover:bg-gray-50 transition-colors cursor-pointer group">
                        <div className="flex items-start justify-between gap-3">
                          <div className="flex items-start gap-2.5 min-w-0">
                            {ic ? (
                              item.status === 'complete' ?
                                <div className="w-4 h-4 mt-0.5 rounded-full bg-emerald-500 flex items-center justify-center shrink-0"><span className="text-white"><svg className="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg></span></div>
                              : <div className={`w-4 h-4 mt-0.5 rounded-full border-2 shrink-0 ${item.status==='in-progress'?'border-primary-400 bg-primary-50':'border-gray-300'}`}></div>
                            ) : (
                              <div className="w-4 h-4 mt-0.5 rounded-full bg-emerald-500 flex items-center justify-center shrink-0"><span className="text-white"><svg className="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg></span></div>
                            )}
                            <div className="min-w-0">
                              <div className="flex items-center gap-2">
                                <span className="text-[10px] font-mono font-semibold text-primary-600">{item.item}</span>
                                <span className="text-xs font-medium text-gray-800">{item.name}</span>
                              </div>
                              <p className="text-[10px] sm:text-[11px] text-gray-500 mt-0.5 leading-relaxed">{item.desc}</p>
                              {ic && (
                                <div className="flex flex-wrap items-center gap-x-3 gap-y-1 mt-1.5">
                                  <span className="text-[10px] text-gray-400">Assignee: <span className="font-medium text-gray-600">{item.assignee}</span></span>
                                  <span className="text-[10px] text-gray-400">Due: <span className="font-medium text-gray-600">{item.due}</span></span>
                                </div>
                              )}
                            </div>
                          </div>
                          <div className="flex items-center gap-2 shrink-0 mt-0.5">
                            {ic ? (
                              <span className={`hidden sm:inline px-2 py-px rounded-full text-[10px] font-medium ${getStatusColor(item.status)}`}>{getStatusLabel(item.status)}</span>
                            ) : (
                              <span className="hidden sm:inline px-2 py-px rounded-full text-[10px] font-medium bg-emerald-100 text-emerald-700">Complete</span>
                            )}
                            <span className="text-gray-300 group-hover:text-gray-500"><Icons.ArrowRight /></span>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════
    function PlaceholderPage({title,desc}){return<div className="flex items-center justify-center h-64"><div className="text-center"><h2 className="text-lg font-semibold text-gray-800 mb-1">{title}</h2><p className="text-sm text-gray-500">{desc}</p></div></div>}

    function App() {
      const [activePage, setActivePage] = useState('dashboard');
      const [mobileOpen, setMobileOpen] = useState(false);
      const pageTitles = {
        'dashboard': ['Disclosure Dashboard', `${COMPANY.name} \u00b7 Q1 2026 Quarterly Report (10-Q)`],
        'filings-10q': ['10-Q Filings', `${COMPANY.name} \u00b7 Quarterly Report Management`],
        'filings-10k': ['10-K Filings', `${COMPANY.name} \u00b7 Annual Report Management`],
        'financial-statements': ['Financial Statements', 'Review and manage condensed consolidated statements'],
        'notes': ['Notes to Financial Statements', 'Disclosure notes and XBRL tagging'],
        'xbrl-tagging': ['XBRL Tagging', `${COMPANY.name} \u00b7 Tag financial data with US GAAP taxonomy`],
        'validation': ['Validation', 'XBRL validation rules and error resolution'],
        'settings': ['Settings', 'Application and filing configuration'],
      };
      const [title, subtitle] = pageTitles[activePage] || ['Page', ''];
      const renderPage = () => { switch(activePage){ case 'dashboard':return <DashboardPage/>;case 'filings-10q':return <FilingsPage/>;case 'filings-10k':return <TenKFilingsPage/>;case 'xbrl-tagging':return <XBRLTaggingPage/>;default:return <PlaceholderPage title={title} desc="This section is under development."/>; }};
      return (
        <div className="flex min-h-screen bg-gray-50">
          <Sidebar activePage={activePage} onNavigate={setActivePage} mobileOpen={mobileOpen} onMobileClose={()=>setMobileOpen(false)} />
          <div className="flex-1 lg:ml-60 flex flex-col min-h-screen">
            <Header title={title} subtitle={subtitle} onMenuClick={()=>setMobileOpen(true)} />
            <main className={`flex-1 p-3 sm:p-4 lg:p-5 overflow-y-auto ${activePage==='xbrl-tagging'?'p-3 sm:p-3 lg:p-4':''}`}>{renderPage()}</main>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
